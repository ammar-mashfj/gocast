							<head></head><body><div style="border-radius: var(--border-radius-lg); overflow: hidden; background: #0a0a0f; color: #fff; font-family: var(--font-sans);">
<style>
@keyframes spinRing { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes fadeStep { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulseLive { 0%,100% { box-shadow: 0 0 0 0 rgba(52,211,153,0.4); } 70% { box-shadow: 0 0 0 12px rgba(52,211,153,0); } }
@keyframes expandBar { from { width: 0%; } to { width: 100%; } }
.flow * { box-sizing: border-box; margin: 0; padding: 0; }
.flow { display: flex; flex-direction: column; gap: 24px; padding: 32px; }
.flow-label { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(255,255,255,0.15); margin-bottom: 8px; }
.flow-states { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.flow-state { background: rgba(255,255,255,0.02); border: 0.5px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 28px 24px; text-align: center; position: relative; overflow: hidden; }
.flow-state-active { border-color: rgba(139,92,246,0.3); background: rgba(139,92,246,0.03); }
.flow-state-done { border-color: rgba(52,211,153,0.2); background: rgba(52,211,153,0.02); }
.flow-state-num { font-size: 10px; color: rgba(255,255,255,0.1); letter-spacing: 1px; margin-bottom: 16px; }
.flow-state-icon { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
.fs-pending .flow-state-icon { background: rgba(255,255,255,0.03); border: 0.5px solid rgba(255,255,255,0.06); color: rgba(255,255,255,0.15); }
.fs-connecting .flow-state-icon { background: rgba(139,92,246,0.1); border: 2px solid rgba(139,92,246,0.3); color: rgba(139,92,246,0.8); position: relative; }
.fs-connecting .flow-state-icon::after { content: ''; position: absolute; inset: -4px; border-radius: 50%; border: 2px solid transparent; border-top-color: rgba(139,92,246,0.6); animation: spinRing 1s linear infinite; }
.fs-live .flow-state-icon { background: rgba(52,211,153,0.12); border: 2px solid rgba(52,211,153,0.3); color: #34d399; animation: pulseLive 2s infinite; }
.flow-state-title { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
.fs-pending .flow-state-title { color: rgba(255,255,255,0.2); }
.fs-connecting .flow-state-title { color: rgba(139,92,246,0.8); }
.fs-live .flow-state-title { color: #34d399; }
.flow-state-desc { font-size: 12px; color: rgba(255,255,255,0.2); line-height: 1.5; }
.flow-state-steps { display: flex; flex-direction: column; gap: 6px; margin-top: 14px; text-align: left; }
.flow-step { display: flex; align-items: center; gap: 8px; font-size: 11px; }
.flow-step-done { color: rgba(52,211,153,0.7); }
.flow-step-active { color: rgba(139,92,246,0.7); }
.flow-step-pending { color: rgba(255,255,255,0.12); }
.flow-step-icon { width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.flow-arrow { display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.06); position: absolute; right: -22px; top: 50%; transform: translateY(-50%); z-index: 2; }
.flow-preview { background: rgba(255,255,255,0.02); border: 0.5px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 24px; }
.flow-preview-title { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.15); margin-bottom: 16px; }
.flow-modal { background: rgba(0,0,0,0.5); border-radius: 14px; padding: 40px; display: flex; flex-direction: column; align-items: center; text-align: center; }
.flow-modal-spinner { width: 48px; height: 48px; border-radius: 50%; border: 2px solid rgba(139,92,246,0.15); border-top-color: rgba(139,92,246,0.7); animation: spinRing 0.8s linear infinite; margin-bottom: 20px; }
.flow-modal-title { font-size: 16px; font-weight: 500; color: #e8e8e8; margin-bottom: 8px; }
.flow-modal-desc { font-size: 13px; color: rgba(255,255,255,0.3); margin-bottom: 20px; }
.flow-modal-steps { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 280px; }
.fm-step { display: flex; align-items: center; gap: 10px; font-size: 13px; }
.fm-step-done { color: #34d399; }
.fm-step-active { color: rgba(139,92,246,0.8); }
.fm-step-pending { color: rgba(255,255,255,0.12); }
.fm-step-icon { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.fm-step-done .fm-step-icon { background: rgba(52,211,153,0.12); }
.fm-step-active .fm-step-icon { background: rgba(139,92,246,0.12); }
.fm-step-pending .fm-step-icon { background: rgba(255,255,255,0.03); }
.flow-live-confirm { background: rgba(52,211,153,0.05); border: 0.5px solid rgba(52,211,153,0.15); border-radius: 14px; padding: 32px; display: flex; flex-direction: column; align-items: center; text-align: center; }
.flc-icon { width: 56px; height: 56px; border-radius: 50%; background: rgba(52,211,153,0.12); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; animation: pulseLive 2s infinite; }
.flc-title { font-size: 18px; font-weight: 500; color: #34d399; margin-bottom: 6px; }
.flc-desc { font-size: 13px; color: rgba(255,255,255,0.3); margin-bottom: 20px; }
.flc-url { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: rgba(255,255,255,0.03); border: 0.5px solid rgba(255,255,255,0.08); border-radius: 8px; font-size: 13px; color: rgba(255,255,255,0.35); }
.flc-url-copy { color: rgba(139,92,246,0.7); font-size: 12px; cursor: pointer; }
.flc-actions { display: flex; gap: 10px; margin-top: 20px; }
.flc-btn { padding: 10px 20px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: all 0.15s; }
.flc-btn-primary { background: rgba(139,92,246,0.9); color: #fff; border: none; }
.flc-btn-secondary { background: transparent; color: rgba(255,255,255,0.4); border: 0.5px solid rgba(255,255,255,0.1); }
</style>

<div class="flow">
  <div>
    <div class="flow-label">Connection flow — what happens when user clicks "Go live"</div>
  </div>

  <!-- CONNECTING MODAL -->
  <div class="flow-modal">
    <div class="flow-modal-spinner"></div>
    <div class="flow-modal-title">Going on air...</div>
    <div class="flow-modal-desc">Setting up your broadcast</div>
    <div class="flow-modal-steps">
      <div class="fm-step fm-step-done">
        <div class="fm-step-icon">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        Microphone access granted
      </div>
      <div class="fm-step fm-step-done">
        <div class="fm-step-icon">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        Audio encoder ready
      </div>
      <div class="fm-step fm-step-active">
        <div class="fm-step-icon">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"></circle></svg>
        </div>
        Connecting to stream relay...
      </div>
      <div class="fm-step fm-step-pending">
        <div class="fm-step-icon"></div>
        Mount point active
      </div>
    </div>
  </div>

  <!-- SUCCESS — YOU'RE LIVE -->
  <div class="flow-live-confirm">
    <div class="flc-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </div>
    <div class="flc-title">You're on air!</div>
    <div class="flc-desc">Your station is now live. Share your link with your audience.</div>
    <div class="flc-url">
      gocast.fm/jazz-lounge
      <span class="flc-url-copy">Copy</span>
    </div>
    <div class="flc-actions">
      <button class="flc-btn flc-btn-primary">Open broadcaster controls</button>
      <button class="flc-btn flc-btn-secondary">Share on social</button>
    </div>
  </div>
</div>
</div>
</body></html>
