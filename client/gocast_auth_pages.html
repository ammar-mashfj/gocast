<style>
.auth-page * { box-sizing: border-box; margin: 0; padding: 0; }
.auth-page { min-height: 580px; display: flex; align-items: center; justify-content: center; position: relative; padding: 40px; }
.auth-bg { position: absolute; top: 30%; left: 50%; width: 500px; height: 500px; transform: translate(-50%, -50%); border-radius: 50%; background: radial-gradient(circle, rgba(139,92,246,0.06) 0%, transparent 65%); pointer-events: none; }
.auth-card { width: 100%; max-width: 400px; position: relative; z-index: 1; }
.auth-logo { text-align: center; margin-bottom: 32px; }
.auth-logo-text { font-size: 22px; font-weight: 500; }
.auth-logo-text span { color: rgba(139,92,246,0.9); }
.auth-logo-sub { font-size: 13px; color: rgba(255,255,255,0.2); margin-top: 6px; }
.auth-tabs { display: flex; gap: 2px; margin-bottom: 28px; background: rgba(255,255,255,0.03); border-radius: 8px; padding: 3px; }
.auth-tab { flex: 1; text-align: center; padding: 10px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; color: rgba(255,255,255,0.3); }
.auth-tab.active { background: rgba(139,92,246,0.15); color: rgba(139,92,246,0.9); }
.auth-tab:hover:not(.active) { color: rgba(255,255,255,0.5); }
.auth-form { display: flex; flex-direction: column; gap: 16px; }
.auth-field { display: flex; flex-direction: column; gap: 6px; }
.auth-label { font-size: 12px; color: rgba(255,255,255,0.25); letter-spacing: 0.5px; }
.auth-input { background: rgba(255,255,255,0.03); border: 0.5px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 12px 14px; font-size: 14px; color: #e0e0e0; font-family: inherit; outline: none; transition: border-color 0.15s; width: 100%; }
.auth-input:focus { border-color: rgba(139,92,246,0.5); }
.auth-input::placeholder { color: rgba(255,255,255,0.12); }
.auth-btn { width: 100%; padding: 13px; background: rgba(139,92,246,0.9); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; margin-top: 4px; }
.auth-btn:hover { background: rgba(139,92,246,1); transform: translateY(-1px); }
.auth-divider { display: flex; align-items: center; gap: 14px; margin: 4px 0; }
.auth-divider-line { flex: 1; height: 0.5px; background: rgba(255,255,255,0.06); }
.auth-divider-text { font-size: 11px; color: rgba(255,255,255,0.15); letter-spacing: 0.5px; }
.auth-social { display: flex; gap: 10px; }
.auth-social-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 11px; background: rgba(255,255,255,0.03); border: 0.5px solid rgba(255,255,255,0.08); border-radius: 8px; font-size: 13px; color: rgba(255,255,255,0.4); cursor: pointer; transition: all 0.15s; }
.auth-social-btn:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.6); border-color: rgba(255,255,255,0.12); }
.auth-footer { text-align: center; margin-top: 20px; font-size: 12px; color: rgba(255,255,255,0.15); }
.auth-footer a { color: rgba(139,92,246,0.7); text-decoration: none; }
.auth-forgot { text-align: right; }
.auth-forgot a { font-size: 12px; color: rgba(139,92,246,0.6); text-decoration: none; }
.auth-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.auth-panel { padding: 20px; }
.auth-panel-divider { width: 0.5px; background: rgba(255,255,255,0.06); }
</style>

      <div class="auth-form">
        <div class="auth-field">
          <div class="auth-label">Name</div>
          <input class="auth-input" type="text" placeholder="Your name">
        </div>

        <div class="auth-field">
          <div class="auth-label">Email</div>
          <input class="auth-input" type="email" placeholder="you@example.com">
        </div>

        <div class="auth-field">

          <input class="auth-input" type="password" placeholder="Min 8 characters">

</div>
