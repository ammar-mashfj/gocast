<style>
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
@keyframes barAnim1 { 0%,100% { height: 12px; } 50% { height: 38px; } }
@keyframes barAnim2 { 0%,100% { height: 28px; } 50% { height: 8px; } }
@keyframes barAnim3 { 0%,100% { height: 18px; } 50% { height: 42px; } }
@keyframes barAnim4 { 0%,100% { height: 32px; } 50% { height: 14px; } }
@keyframes barAnim5 { 0%,100% { height: 8px; } 50% { height: 36px; } }
@keyframes float1 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
@keyframes float2 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
@keyframes waveMove { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
@keyframes livePulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,59,48,0.6); } 70% { box-shadow: 0 0 0 10px rgba(255,59,48,0); } }
.gc-page { position: relative; min-height: 700px; display: grid; grid-template-columns: 1fr 1fr; overflow: hidden; }
.gc-left { position: relative; display: flex; align-items: center; justify-content: center; padding: 3rem; z-index: 2; }
.gc-right { position: relative; display: flex; flex-direction: column; justify-content: center; padding: 3rem 3rem 3rem 1rem; z-index: 2; }
.gc-bg-wash { position: absolute; top: -20%; right: -10%; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, transparent 70%); z-index: 0; pointer-events: none; }
.gc-bg-wash2 { position: absolute; bottom: -10%; left: -10%; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(236,72,153,0.1) 0%, transparent 70%); z-index: 0; pointer-events: none; }
.gc-vinyl-wrap { position: relative; width: 320px; height: 320px; animation: float1 6s ease-in-out infinite; }
.gc-vinyl { width: 320px; height: 320px; border-radius: 50%; background: conic-gradient(from 0deg, #1a1a2e, #16162a, #1a1a2e, #0f0f1f, #1a1a2e, #16162a, #1a1a2e); animation: spin 4s linear infinite; position: relative; display: flex; align-items: center; justify-content: center; }
.gc-vinyl::before { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 1px solid rgba(255,255,255,0.05); }
.gc-vinyl-groove1 { position: absolute; width: 280px; height: 280px; border-radius: 50%; border: 0.5px solid rgba(255,255,255,0.04); }
.gc-vinyl-groove2 { position: absolute; width: 240px; height: 240px; border-radius: 50%; border: 0.5px solid rgba(255,255,255,0.03); }
.gc-vinyl-art { width: 160px; height: 160px; border-radius: 50%; background: linear-gradient(135deg, #1a0533, #2d1b69, #1a0533); display: flex; align-items: center; justify-content: center; border: 2px solid rgba(255,255,255,0.1); position: relative; overflow: hidden; }
.gc-vinyl-art-inner { font-size: 42px; opacity: 0.7; }
.gc-vinyl-dot { position: absolute; width: 12px; height: 12px; background: #0a0a0f; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); }
.gc-eq-bars { display: flex; align-items: flex-end; gap: 3px; height: 44px; margin-bottom: 1.5rem; }
.gc-eq-bar { width: 4px; border-radius: 2px; background: rgba(139,92,246,0.8); }
.gc-eq-bar:nth-child(1) { animation: barAnim1 1.1s ease-in-out infinite; }
.gc-eq-bar:nth-child(2) { animation: barAnim2 0.9s ease-in-out infinite; }
.gc-eq-bar:nth-child(3) { animation: barAnim3 1.3s ease-in-out infinite; }
.gc-eq-bar:nth-child(4) { animation: barAnim4 0.8s ease-in-out infinite; }
.gc-eq-bar:nth-child(5) { animation: barAnim5 1.0s ease-in-out infinite; }
.gc-eq-bar:nth-child(6) { animation: barAnim1 1.2s ease-in-out infinite 0.1s; }
.gc-eq-bar:nth-child(7) { animation: barAnim3 0.7s ease-in-out infinite 0.2s; }
.gc-eq-bar:nth-child(8) { animation: barAnim2 1.4s ease-in-out infinite; }
.gc-eq-bar:nth-child(9) { animation: barAnim4 0.9s ease-in-out infinite 0.15s; }

.gc-eq-bar:nth-child(11) { animation: barAnim1 0.85s ease-in-out infinite; }

.gc-live-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,59,48,0.15); color: #ff3b30; font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; padding: 6px 14px; border-radius: 20px; margin-bottom: 1rem; width: fit-content; }
.gc-live-dot { width: 8px; height: 8px; background: #ff3b30; border-radius: 50%; animation: livePulse 1.5s ease-in-out infinite; }

.gc-station-name { font-size: 48px; font-weight: 500; letter-spacing: -1px; line-height: 1.1; margin-bottom: 0.75rem; color: #f0f0f0; }

.gc-now-playing { display: flex; align-items: center; gap: 12px; margin-bottom: 2.5rem; padding: 12px 16px; background: rgba(255,255,255,0.04); border-radius: 12px; border: 0.5px solid rgba(255,255,255,0.08); }

.gc-np-artist { font-size: 13px; color: rgba(255,255,255,0.4); }
.gc-controls { display: flex; align-items: center; gap: 20px; margin-bottom: 2rem; }
.gc-play-btn { width: 64px; height: 64px; border-radius: 50%; background: rgba(139,92,246,0.9); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.15s, background 0.15s; flex-shrink: 0; }
.gc-play-btn:hover { transform: scale(1.08); background: rgba(139,92,246,1); }

.gc-vol-wrap { display: flex; align-items: center; gap: 10px; flex: 1; max-width: 200px; }

.gc-listeners-dot { width: 6px; height: 6px; background: #34d399; border-radius: 50%; }
.gc-meta-row { display: flex; align-items: center; gap: 24px; margin-bottom: 2rem; }
.gc-share-row { display: flex; align-items: center; gap: 12px; }

.gc-wave-wrap { position: absolute; bottom: 60px; left: 0; right: 0; height: 40px; overflow: hidden; z-index: 1; opacity: 0.06; }
.gc-wave { display: flex; animation: waveMove 8s linear infinite; }
