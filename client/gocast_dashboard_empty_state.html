<style>
.es * { box-sizing: border-box; margin: 0; padding: 0; }
.es { display: grid; grid-template-columns: 56px 1fr; min-height: 500px; }
.es-sb { background: rgba(255,255,255,0.02); border-right: 0.5px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; align-items: center; padding: 16px 0; gap: 6px; }

.es-sb-item.active { background: rgba(139,92,246,0.12); color: rgba(139,92,246,0.8); }
.es-sb-spacer { flex: 1; }
.es-sb-avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(139,92,246,0.12); display: flex; align-items: center; justify-content: center; font-size: 11px; color: rgba(139,92,246,0.7); font-weight: 500; }
.es-main { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; position: relative; }
.es-bg { position: absolute; top: 40%; left: 50%; width: 400px; height: 400px; transform: translate(-50%, -50%); border-radius: 50%; background: radial-gradient(circle, rgba(139,92,246,0.05) 0%, transparent 65%); pointer-events: none; }
.es-icon { width: 80px; height: 80px; border-radius: 20px; background: rgba(139,92,246,0.08); border: 0.5px solid rgba(139,92,246,0.15); display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; position: relative; z-index: 1; }
.es-title { font-size: 22px; font-weight: 500; color: #e8e8e8; margin-bottom: 10px; position: relative; z-index: 1; }
.es-desc { font-size: 15px; color: rgba(255,255,255,0.3); max-width: 380px; line-height: 1.6; margin-bottom: 32px; position: relative; z-index: 1; }
.es-btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; background: rgba(139,92,246,0.9); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.15s; position: relative; z-index: 1; }
.es-btn:hover { background: rgba(139,92,246,1); transform: translateY(-1px); }
.es-steps { display: flex; gap: 32px; margin-top: 48px; position: relative; z-index: 1; }
.es-step { display: flex; align-items: center; gap: 10px; }
.es-step-num { width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.04); border: 0.5px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; font-size: 12px; color: rgba(255,255,255,0.2); font-weight: 500; flex-shrink: 0; }

.es-step-arrow { color: rgba(255,255,255,0.08); }
