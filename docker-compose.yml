services:
  mysql:
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gocast
      MYSQL_USER: ammar
      MYSQL_PASSWORD: "06011995"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - /app/vendor
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  relay:
    build: ./relay
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./relay:/app
      - /app/node_modules
    environment:
      WS_PORT: 8080
      HEALTH_PORT: 8081
      ICECAST_HOST: host.docker.internal
      ICECAST_PORT: 8888
      ICECAST_SOURCE_PASSWORD: "06011995"
      ICECAST_ADMIN_USER: admin
      ICECAST_ADMIN_PASSWORD: "06011995"
      API_URL: http://api:8000/api
    depends_on:
      - api
    extra_hosts:
      - "host.docker.internal:host-gateway"

  client:
    build: ./client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      VITE_APP_URL: http://localhost:5173
      VITE_API_URL: http://localhost:8000/api
      VITE_WS_URL: ws://localhost:8080
      VITE_ICECAST_URL: http://localhost:8888
    depends_on:
      - api

volumes:
  mysql_data:
  redis_data:
